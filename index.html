<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подготовка к тесту</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Подготовка к тесту</h1>
      <p id="status" class="status">Загрузка вопросов...</p>
      <section id="quiz" class="quiz hidden">
        <h2 id="question-text"></h2>
        <div id="answers" class="answers"></div>
      </section>
      <section class="controls">
        <button id="show-results" type="button">Показать ответы</button>
        <button id="reset-progress" type="button">Сбросить прогресс</button>
      </section>
      <pre id="results-output" class="results hidden"></pre>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
